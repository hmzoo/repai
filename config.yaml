# Configuration RepaI

# LLM Settings
llm:
  provider: "google"  # openai, google, anthropic, local
  model: "gemini-2.5-flash"  # gemini-2.5-flash, gemini-2.5-pro, gemini-2.0-flash
  temperature: 0.7
  max_tokens: 2000
  api_key: "${GOOGLE_API_KEY}"  # From env

# Execution Settings
execution:
  max_iterations: 10
  timeout_per_iteration: 300  # seconds
  debug_mode: true
  log_all_api_calls: true
  workspace_scan_interval: 5  # run full workspace scan every N iterations

# Agent Settings
agent:
  name: "RepaI"
  version: "1.0"
  auto_tool_creation: true
  recursive_calls: true

# Evolution Settings
evolution:
  enabled: true
  max_tasks_per_iteration: 12
  full_update_interval: 2  # apply full prompt/todo evolution every N iterations
  max_tokens: 1200  # legacy compatibility fallback
  max_tokens_base: 1200  # default budget for compact evolution output
  max_tokens_with_code: 2400  # higher budget when code generation is likely

# Runtime Registry Settings
registry:
  strict_mode: true  # reject aliases and require canonical tool calls

# API Settings
apis:
  google:
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    endpoints:
      - generateContent
      - models (list available models)
  # openai:  # Uncomment to switch back to OpenAI
  #   base_url: "https://api.openai.com/v1"
  #   endpoints:
  #     - chat_completion

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  iteration_log: "iteration_log.md"
  reset_on_start: true
  archive_iterations: true

# Safety Settings
safety:
  max_recursion_depth: 10
  prevent_infinite_loops: true
  allow_system_commands: false  # À affiner selon besoin
  allowed_file_operations: 
    - read
    - write_markdown
    - write_python_tools
